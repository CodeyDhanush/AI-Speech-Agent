<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #3182ce;
            --user-msg: #1f3a5f;
            --ai-msg: #21262d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        #header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        #header h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        #header p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 4px 0 0 0;
        }

        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) var(--surface-color);
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .msg-user {
            align-self: flex-end;
            background-color: var(--user-msg);
            border-bottom-right-radius: 4px;
        }

        .msg-ai {
            align-self: flex-start;
            background-color: var(--ai-msg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .msg-system {
            align-self: center;
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
        }

        #controls {
            padding: 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .mic-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #58a6ff, #8b5cf6);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 4px 14px rgba(88, 166, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.6);
        }

        .mic-btn.recording {
            background: linear-gradient(135deg, #ff4d4d, #f9cb28);
            animation: pulse 1.5s infinite;
            box-shadow: 0 4px 14px rgba(255, 77, 77, 0.4);
        }

        .mic-btn:disabled {
            background: var(--border-color);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(255, 77, 77, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 77, 77, 0);
            }
        }

        #status-text {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="app-container">
        <div id="header">
            <h1 id="agent-name">Voice Assistant</h1>
            <p id="agent-dept">Click "Start Session" to connect</p>
        </div>

        <div id="chat-area">
            <div class="message msg-system">Waiting to connect...</div>
        </div>

        <div id="controls">
            <button id="main-btn" class="mic-btn">▶️</button>
            <div id="status-text">Start Session</div>
        </div>
    </div>

    <script>
        let callSid = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        const chatArea = document.getElementById('chat-area');
        const mainBtn = document.getElementById('main-btn');
        const statusText = document.getElementById('status-text');
        const agentNameEl = document.getElementById('agent-name');
        const agentDeptEl = document.getElementById('agent-dept');

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            if (role === 'user') div.className = 'message msg-user';
            else if (role === 'ai') div.className = 'message msg-ai';
            else div.className = 'message msg-system';
            div.textContent = text;
            chatArea.appendChild(div);
            scrollToBottom();
        }

        async function startSession() {
            mainBtn.disabled = true;
            statusText.textContent = "Connecting...";
            try {
                const response = await fetch('/chat/start', { method: 'POST' });
                const data = await response.json();
                callSid = data.call_sid;
                agentNameEl.textContent = data.agent;
                agentDeptEl.textContent = "Connected • Tap mic to speak";
                chatArea.innerHTML = ''; // Clear chat
                appendMessage('system', 'Session started. Tap the microphone to speak.');

                mainBtn.innerHTML = '🎤';
                mainBtn.disabled = false;
                mainBtn.onclick = toggleRecording;
                statusText.textContent = "Tap to speak";
            } catch (err) {
                console.error(err);
                statusText.textContent = "Connection failed";
                mainBtn.disabled = false;
            }
        }

        async function toggleRecording() {
            if (!isRecording) {
                // Start recording
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                    audioChunks = [];

                    mediaRecorder.ondataavailable = e => {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = async () => {
                        stream.getTracks().forEach(track => track.stop());
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        await sendAudio(audioBlob);
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    mainBtn.classList.add('recording');
                    mainBtn.innerHTML = '⏹️';
                    statusText.textContent = "Recording... tap to send";
                } catch (err) {
                    console.error('Audio error:', err);
                    statusText.textContent = "Microphone access denied";
                }
            } else {
                // Stop recording
                mediaRecorder.stop();
                isRecording = false;
                mainBtn.classList.remove('recording');
                mainBtn.disabled = true;
                mainBtn.innerHTML = '<div class="spinner"></div>';
                statusText.textContent = "Processing audio...";
            }
        }

        async function sendAudio(blob) {
            const formData = new FormData();
            formData.append('call_sid', callSid);
            formData.append('audio', blob, 'recording.webm');

            try {
                const response = await fetch('/chat/message', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.user_text) {
                    appendMessage('user', data.user_text);
                }
                if (data.ai_response) {
                    appendMessage('ai', data.ai_response);
                }

                if (data.agent_name && data.agent_name !== agentNameEl.textContent) {
                    agentNameEl.textContent = data.agent_name;
                    appendMessage('system', `Transferred to ${data.agent_name}`);
                }

            } catch (err) {
                console.error('API error:', err);
                appendMessage('system', 'Error sending message. Please try again.');
            } finally {
                mainBtn.disabled = false;
                mainBtn.innerHTML = '🎤';
                statusText.textContent = "Tap to speak";
            }
        }

        // Initial setup
        mainBtn.addEventListener('click', startSession);

        // Handle page unload to end session
        window.addEventListener('beforeunload', () => {
            if (callSid) {
                const formData = new FormData();
                formData.append('call_sid', callSid);
                navigator.sendBeacon('/chat/end', formData);
            }
        });
    </script>
</body>

</html>
